name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Lint + unit tests run on every push — no secrets, no services required.
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check agentforge
      - name: Unit tests
        run: pytest tests/ -q

  # Validate the compose file (syntax + interpolation) — cheap, no image build.
  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: docker compose config
        run: docker compose config --quiet
      - name: docker compose config (+ langfuse overlay)
        run: docker compose -f docker-compose.yml -f docker-compose.langfuse.yml config --quiet
      - name: docker compose config (+ qdrant overlay)
        run: docker compose -f docker-compose.yml -f docker-compose.qdrant.yml config --quiet

  # Validate the Kubernetes manifests render and pass schema validation.
  k8s-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install kubeconform
        run: |
          curl -sSLo kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform.tar.gz kubeconform
          sudo mv kubeconform /usr/local/bin/
      - name: Render kustomize + validate schemas
        run: |
          kubectl kustomize deploy/k8s > /tmp/rendered.yaml
          kubeconform -strict -summary \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            /tmp/rendered.yaml
          # The one-shot Job + Secret template aren't in the kustomization.
          kubeconform -strict -summary deploy/k8s/ingest-job.yaml deploy/k8s/secret.example.yaml

  # Build the Angular console so TypeScript/template errors fail the build.
  console-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/console
    steps:
      - uses: actions/checkout@v5
      - run: npm install
      - run: npm run build

  # Build both production images (no push) so Dockerfile regressions fail the PR.
  images-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: api
            context: .
          - name: console
            context: apps/console
    steps:
      - uses: actions/checkout@v5
      # Buildx with the docker-container driver — required for GHA cache export.
      - uses: docker/setup-buildx-action@v4
      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Eval gate — blocks the deploy if retrieval/faithfulness regresses.
  # Runs only when an ANTHROPIC_API_KEY secret is configured (skipped on forks).
  eval-gate:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: ${{ github.event_name == 'push' }}
    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: agentforge
          POSTGRES_PASSWORD: agentforge
          POSTGRES_DB: agentforge
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U agentforge"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://agentforge:agentforge@localhost:5432/agentforge
      CHAT_MODEL: anthropic:claude-opus-4-8
      EMBEDDING_MODEL: openai:text-embedding-3-small
      EMBEDDING_DIM: "1536"
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Skip if no key
        id: guard
        run: echo "have_key=${{ secrets.ANTHROPIC_API_KEY != '' }}" >> "$GITHUB_OUTPUT"
      - name: Install
        if: steps.guard.outputs.have_key == 'true'
        run: pip install -e ".[dev]"
      - name: Enable pgvector
        if: steps.guard.outputs.have_key == 'true'
        run: psql "postgresql://agentforge:agentforge@localhost:5432/agentforge" -c "CREATE EXTENSION IF NOT EXISTS vector;"
      - name: Ingest corpus
        if: steps.guard.outputs.have_key == 'true'
        run: python -m agentforge.rag.ingest examples/banking-compliance/corpus
      - name: Run eval gate
        if: steps.guard.outputs.have_key == 'true'
        run: python evals/run_evals.py --threshold 0.8 --out evals/results.json
      - name: Upload eval report
        if: steps.guard.outputs.have_key == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: evals/results.json
