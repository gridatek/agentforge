# Use Qdrant as the vector store instead of pgvector. Overlay on the base compose:
#
#   docker compose -f docker-compose.yml -f docker-compose.qdrant.yml up --build
#
# Postgres (from the base file) is still used for the durable checkpointer; only
# the embeddings move to Qdrant. `--build` rebuilds the api image with the qdrant
# extra (EXTRAS=qdrant). Auto-ingest populates the Qdrant collection on first boot.

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build:
      context: .
      args:
        EXTRAS: qdrant
    environment:
      VECTOR_STORE_BACKEND: qdrant
      QDRANT_URL: http://qdrant:6333
    depends_on:
      qdrant:
        condition: service_started

volumes:
  qdrant_data:
