# One-command local run: `docker compose up`
#   → console at http://localhost:4200, API at http://localhost:8000
#
# After the stack is up, ingest the sample corpus once:
#   docker compose run --rm api agentforge ingest examples/banking-compliance/corpus

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: agentforge
      POSTGRES_PASSWORD: agentforge
      POSTGRES_DB: agentforge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentforge"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://agentforge:agentforge@db:5432/agentforge
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./examples:/app/examples:ro

  console:
    build: ./apps/console
    ports:
      - "4200:4200"
    depends_on:
      - api

volumes:
  pgdata:
