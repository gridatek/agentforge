apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: agentforge
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: agentforge
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api
        app.kubernetes.io/part-of: agentforge
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: api
          image: ghcr.io/gridatek/agentforge-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: agentforge-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: agentforge-secrets
                  key: DATABASE_URL
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agentforge-secrets
                  key: ANTHROPIC_API_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agentforge-secrets
                  key: OPENAI_API_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: agentforge
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: agentforge
spec:
  selector:
    app.kubernetes.io/name: api
  ports:
    - port: 8000
      targetPort: 8000
