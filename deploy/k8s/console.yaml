apiVersion: apps/v1
kind: Deployment
metadata:
  name: console
  namespace: agentforge
  labels:
    app.kubernetes.io/name: console
    app.kubernetes.io/part-of: agentforge
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: console
  template:
    metadata:
      labels:
        app.kubernetes.io/name: console
        app.kubernetes.io/part-of: agentforge
    spec:
      containers:
        - name: console
          image: ghcr.io/gridatek/agentforge-console:latest
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: console
  namespace: agentforge
  labels:
    app.kubernetes.io/name: console
    app.kubernetes.io/part-of: agentforge
spec:
  selector:
    app.kubernetes.io/name: console
  ports:
    - port: 80
      targetPort: 80
