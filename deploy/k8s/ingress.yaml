# Template ingress — edit the host and apply, or delete this file and expose the
# console Service however your cluster prefers (LoadBalancer, gateway, etc.).
#
# Only the console is exposed: it serves the SPA and reverse-proxies /api to the
# API Service same-origin (see apps/console/default.conf.template), so the
# browser never talks to the API host directly. To also expose the API publicly
# (e.g. for curl), add a second host routing to the `api` Service on port 8000.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agentforge
  namespace: agentforge
  labels:
    app.kubernetes.io/part-of: agentforge
spec:
  rules:
    - host: agentforge.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: console
                port:
                  number: 80
