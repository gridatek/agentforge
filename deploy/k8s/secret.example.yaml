# Template — copy to secret.yaml, fill in real values, and apply it SEPARATELY
# (it is gitignored; do not commit secrets). The DATABASE_URL must embed the
# same user/password as POSTGRES_* below.
#
#   cp secret.example.yaml secret.yaml && $EDITOR secret.yaml
#   kubectl apply -f secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: agentforge-secrets
  namespace: agentforge
  labels:
    app.kubernetes.io/part-of: agentforge
type: Opaque
stringData:
  POSTGRES_USER: "agentforge"
  POSTGRES_PASSWORD: "change-me"
  DATABASE_URL: "postgresql+psycopg://agentforge:change-me@db:5432/agentforge"
  # Set the key(s) matching CHAT_MODEL / EMBEDDING_MODEL in the ConfigMap.
  ANTHROPIC_API_KEY: "sk-ant-..."
  OPENAI_API_KEY: "sk-..."
